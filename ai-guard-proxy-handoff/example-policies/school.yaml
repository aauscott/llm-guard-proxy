name: school_default
description: Conservative default policy for a school-hosted local LLM.
mode: fail_closed

defaults:
  classifier_timeout_ms: 750
  log_prompts: false
  canned_response: "I can't help with that, but I can help with a safer version of the question."

stages:
  input:
    enabled_classifiers:
      - terms
      - regex
      - secrets
      - prompt_injection
      - url_obfuscation
  output:
    enabled_classifiers:
      - terms
      - regex
      - secrets
      - prompt_injection

actions:
  critical: block
  high: block
  medium: warn
  low: log

categories:
  prompt_injection:
    min_action: block
  secret_leak:
    min_action: block
  explicit_content:
    min_action: block
  bullying:
    min_action: block
  self_harm:
    min_action: block
  student_pii_leak:
    min_action: block

terms:
  block:
    - "example school-only blocked term"
  warn:
    - "example school-only warning term"

regex:
  block:
    - name: private_key_header
      pattern: "-----BEGIN (RSA|OPENSSH|EC|DSA)? ?PRIVATE KEY-----"
      category: secret_leak
      severity: critical
  warn:
    - name: student_id_label
      pattern: "\\bstudent[_ -]?id\\b"
      category: student_pii_leak
      severity: medium

